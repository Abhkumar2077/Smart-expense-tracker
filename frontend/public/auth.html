<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Expense Tracker - Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #001435 0%, #003087 50%, #00A3E0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            background: #fff;
            border-radius: 25px;
            box-shadow: 0 14px 28px rgba(0,0,0,0.25), 0 10px 10px rgba(0,0,0,0.22);
            position: relative;
            overflow: hidden;
            width: 768px;
            max-width: 100%;
            min-height: 480px;
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.6s ease-in-out;
        }

        .sign-in-container {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        .sign-up-container {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        .container.right-panel-active .sign-in-container {
            transform: translateX(100%);
        }

        .container.right-panel-active .sign-up-container {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: show 0.6s;
        }

        @keyframes show {
            0%, 49.99% {
                opacity: 0;
                z-index: 1;
            }
            50%, 100% {
                opacity: 1;
                z-index: 5;
            }
        }

        .overlay-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 100;
        }

        .container.right-panel-active .overlay-container {
            transform: translateX(-100%);
        }

        .overlay {
            background: linear-gradient(to right, #003087, #00A3E0);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: 0 0;
            color: #ffffff;
            position: relative;
            left: -100%;
            height: 100%;
            width: 200%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .container.right-panel-active .overlay {
            transform: translateX(50%);
        }

        .overlay-panel {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 40px;
            text-align: center;
            top: 0;
            height: 100%;
            width: 50%;
            transform: translateX(0);
            transition: transform 0.6s ease-in-out;
        }

        .overlay-left {
            transform: translateX(-20%);
        }

        .container.right-panel-active .overlay-left {
            transform: translateX(0);
        }

        .overlay-right {
            right: 0;
            transform: translateX(0);
        }

        .container.right-panel-active .overlay-right {
            transform: translateX(20%);
        }

        .form {
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 50px;
            height: 100%;
            text-align: center;
        }

        .social-container {
            margin: 20px 0;
        }

        .social-container a {
            border: 1px solid #dddddd;
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0 5px;
            height: 40px;
            width: 40px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
        }

        .social-container a:hover {
            border-color: #003087;
            color: #003087;
        }

        .social-container a.facebook:hover {
            background: #3b5998;
            border-color: #3b5998;
            color: white;
        }

        .social-container a.google:hover {
            background: #db4437;
            border-color: #db4437;
            color: white;
        }

        .social-container a.linkedin:hover {
            background: #0077b5;
            border-color: #0077b5;
            color: white;
        }

        .form h1 {
            font-weight: bold;
            margin: 0;
            font-size: 28px;
        }

        .form p {
            font-size: 14px;
            font-weight: 100;
            line-height: 20px;
            letter-spacing: 0.5px;
            margin: 20px 0 30px;
        }

        .form input {
            background: #eee;
            border: none;
            padding: 12px 15px;
            margin: 8px 0;
            width: 100%;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
        }

        .form input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #003087;
        }

        .form button {
            border-radius: 20px;
            border: 1px solid #003087;
            background: #003087;
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            padding: 12px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: transform 80ms ease-in;
            cursor: pointer;
            margin-top: 10px;
        }

        .form button:active {
            transform: scale(0.95);
        }

        .form button:focus {
            outline: none;
        }

        .form button.ghost {
            background: transparent;
            border-color: #ffffff;
        }

        .form .forgot-password {
            color: #333;
            font-size: 14px;
            text-decoration: none;
            margin-top: 15px;
            display: block;
        }

        .form .forgot-password:hover {
            color: #003087;
        }

        .overlay h1 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .overlay p {
            font-size: 14px;
            font-weight: 100;
            line-height: 20px;
            letter-spacing: 0.5px;
            margin: 20px 0 30px;
        }

        .overlay button {
            border-radius: 20px;
            border: 1px solid #ffffff;
            background: transparent;
            color: #ffffff;
            font-size: 12px;
            font-weight: bold;
            padding: 12px 45px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: transform 80ms ease-in;
            cursor: pointer;
        }

        .overlay button:hover {
            background: #ffffff;
            color: #003087;
        }

        @media (max-width: 768px) {
            .container {
                width: 100%;
                min-height: 100vh;
                border-radius: 0;
            }

            .form-container {
                width: 100%;
            }

            .sign-in-container,
            .sign-up-container {
                width: 100%;
                left: 0;
            }

            .overlay-container {
                display: none;
            }

            .container.right-panel-active .sign-in-container {
                transform: translateX(-100%);
            }

            .container.right-panel-active .sign-up-container {
                transform: translateX(-100%);
            }

            .form {
                padding: 0 30px;
            }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .form-container {
                width: 100%;
            }

            .sign-in-container,
            .sign-up-container {
                width: 100%;
                left: 0;
            }

            .overlay-container {
                display: none;
            }

            .container.right-panel-active .sign-in-container {
                transform: translateX(-100%);
            }

            .container.right-panel-active .sign-up-container {
                transform: translateX(-100%);
            }

            .form {
                padding: 0 30px;
            }

            .form h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form class="form" action="#" id="signUpForm">
                <h1>Create Account</h1>
                <div class="social-container">
                    <a href="#" class="social facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social google"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social linkedin"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>or use your email for registration</span>
                <input type="text" placeholder="Name" id="signUpName" required />
                <input type="email" placeholder="Email" id="signUpEmail" required />
                <input type="password" placeholder="Password" id="signUpPassword" required />
                <button type="submit">Sign Up</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form class="form" action="#" id="signInForm">
                <h1>Sign In</h1>
                <div class="social-container">
                    <a href="#" class="social facebook"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social google"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social linkedin"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>or use your account</span>
                <input type="email" placeholder="Email" id="signInEmail" required />
                <input type="password" placeholder="Password" id="signInPassword" required />
                <a href="#" class="forgot-password">Forgot your password?</a>
                <button type="submit">Sign In</button>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Friend!</h1>
                    <p>Enter your personal details and start journey with us</p>
                    <button class="ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const signUpButton = document.getElementById('signUp');
        const signInButton = document.getElementById('signIn');
        const container = document.getElementById('container');

        signUpButton.addEventListener('click', () => {
            container.classList.add('right-panel-active');
        });

        signInButton.addEventListener('click', () => {
            container.classList.remove('right-panel-active');
        });

        // Basic form handling (you can integrate with your backend API)
        const signInForm = document.getElementById('signInForm');
        const signUpForm = document.getElementById('signUpForm');

        signInForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('signInEmail').value;
            const password = document.getElementById('signInPassword').value;
            console.log('Sign In:', { email, password });
            // Add your sign in logic here
            alert('Sign In functionality to be implemented');
        });

        signUpForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('signUpName').value;
            const email = document.getElementById('signUpEmail').value;
            const password = document.getElementById('signUpPassword').value;
            console.log('Sign Up:', { name, email, password });
            // Add your sign up logic here
            alert('Sign Up functionality to be implemented');
        });
    </script>
</body>
</html>
